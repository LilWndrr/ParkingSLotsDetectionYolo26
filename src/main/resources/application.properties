spring.application.name=CarDetection
server.port=8085

# --- DATABASE ---
# It looks for DB_HOST, but defaults to localhost if not found!
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/car_detection
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# --- RABBITMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

